{% load static %}
<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{--primary-blue:#014B87;--white:#ffffff;--bg:#eaf8fb}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--primary-blue)}
    nav{background:var(--primary-blue);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;color:var(--white)}
    .logo img{height:40px;display:block;filter:none;-webkit-filter:none;box-shadow:none;border-radius:0;background:transparent;opacity:1;transform:none}
    .nav-links{display:flex;gap:28px}
    .nav-links a{color:var(--white);text-decoration:none;font-weight:700;font-size:13px;text-transform:uppercase}
    .nav-actions .profile-icon{font-size:20px;color:var(--white);display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08)}
    .login-page .nav-links{display:none !important}

    /* Centered login card */
    .login-wrap{min-height:calc(100vh - 75px);display:flex;align-items:center;justify-content:center;padding:40px}
    .login-card{width:420px;background:#fff;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.12);overflow:hidden}
    .login-card .card-header{background:var(--primary-blue);color:var(--white);padding:16px 24px;text-align:center;font-weight:800;font-size:20px;letter-spacing:1px}
    .login-card .card-body{padding:28px}
    .field-label{display:block;color:var(--primary-blue);font-weight:700;margin-bottom:8px}
    .input{width:100%;padding:12px;border:1px solid #eee;border-radius:4px;background:#f6f6f8;margin-bottom:18px;font-family:'Montserrat',sans-serif}
    .btn{display:inline-block;background:var(--primary-blue);color:var(--white);padding:10px 22px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
    .center{display:flex;justify-content:center}
    @media (max-width:520px){.login-card{width:92%}}
  </style>
</head>

<body class="login-page">

  {% include 'includes/header.html' %}

  <main class="login-wrap">
    <div class="login-card">
      <div class="card-header">INICIO DE SESIÓN</div>
      <div class="card-body">
        <form method="post" action="{% url 'site_login' %}">
          {% csrf_token %}

          <label class="field-label" for="id_username">Correo electrónico:</label>
          <input class="input" id="id_username" name="username" type="text" placeholder="john.doe@dms.com" value="{{ request.POST.username|default_if_none:'' }}">

          <label class="field-label" for="id_password">Contraseña:</label>
          <input class="input" id="id_password" name="password" type="password" placeholder="***************">

          {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

          <div class="center"><button class="btn" type="submit">ENTRAR</button></div>
+          {% if form.non_field_errors %}
+            <div class="errors" style="margin-top:12px;color:#d00;text-align:center;font-weight:600;">{{ form.non_field_errors }}</div>
+          {% endif %}
        </form>
      </div>
    </div>
  </main>

</body>

</html>
